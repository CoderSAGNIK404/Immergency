<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Multi-Scenario Emergency VR Training</title>
    <!-- A-Frame Core -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- A-Frame Physics System (Ammo driver) -->
    <script src="https://cdn.jsdelivr.net/gh/MozillaReality/ammo.js@8bbc0ea/builds/ammo.wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <!-- A-Frame Extras (movement controls) -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <!-- ===== CUSTOM COMPONENTS & GAME LOGIC ===== -->
    <script>
        // Global Game State
        window.gameState = {
            currentScenario: 'HUB',
            waterLevel: -0.5,
            floodActive: false
        };

        // Teleporter (Portal Doors)
        AFRAME.registerComponent('portal', {
            schema: { target: { type: 'vec3' }, scenario: { type: 'string' } },
            init: function () {
                this.el.addEventListener('click', () => {
                   let rig = document.querySelector('#rig');
                   // Teleport rig
                   rig.setAttribute('position', this.data.target);
                   // Reset Y pos in case player was crouching
                   rig.setAttribute('position', {x: this.data.target.x, y: 0, z: this.data.target.z});
                   
                   window.gameState.currentScenario = this.data.scenario;
                   
                   // Reset flood state if entering flood room
                   if(this.data.scenario === 'FLOOD') {
                       window.gameState.floodActive = true;
                       window.gameState.waterLevel = -0.5;
                   }
                });
            }
        });

        // Main Scenario Manager (Ticks every frame to check conditions)
        AFRAME.registerComponent('scenario-manager', {
            tick: function () {
                let cam = document.querySelector('#head');
                if (!cam) return;
                
                let headPos = new THREE.Vector3();
                cam.object3D.getWorldPosition(headPos);
                
                let textEl = document.querySelector('#watch-text');
                if (!textEl) return;

                let state = window.gameState.currentScenario;

                // ------------------------------------
                // HUB ROOM
                // ------------------------------------
                if (state === 'HUB') {
                    textEl.setAttribute('value', 'HUB:\nCHOOSE\nSCENARIO');
                    textEl.setAttribute('color', 'white');
                }
                
                // ------------------------------------
                // FIRE PROTOCOL (0, 0, 100)
                // ------------------------------------
                else if (state === 'FIRE') {
                    // Smoke layer sits at Y=1.2 globally
                    // If head is above 1.2m, take damage
                    if (headPos.y > 1.2) {
                        textEl.setAttribute('value', 'WARNING:\nTOXIC SMOKE!\nCROUCH LOW');
                        textEl.setAttribute('color', '#FF0000');
                    } else {
                        textEl.setAttribute('value', 'SAFE:\nKEEP LOW\nTO EXIT');
                        textEl.setAttribute('color', '#00FF00');
                    }
                }
                
                // ------------------------------------
                // EARTHQUAKE PROTOCOL (-100, 0, 0)
                // ------------------------------------
                else if (state === 'EARTHQUAKE') {
                    let eqRoom = document.querySelector('#eq-room');
                    // Vibrate/Shake room
                    let shake = 0.08;
                    eqRoom.object3D.position.set(-100 + (Math.random()-0.5)*shake, (Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
                    
                    // Table bounds check relative to room (-100, 0, 0)
                    let rx = headPos.x + 100;
                    let rz = headPos.z;
                    // Table is 1.5x1.5m at origin. X,Z bounds approx -0.75 to 0.75. Height < 1.0.
                    let underTable = headPos.y < 1.0 && rx > -0.8 && rx < 0.8 && rz > -0.8 && rz < 0.8;
                    
                    if (underTable) {
                        textEl.setAttribute('value', 'SAFE:\nCOVER & HOLD');
                        textEl.setAttribute('color', '#00FF00');
                    } else {
                        textEl.setAttribute('value', 'WARNING:\nQUAKE!\nGET UNDER TABLE');
                        textEl.setAttribute('color', '#FF0000');
                    }
                }
                
                // ------------------------------------
                // WAR/AIR RAID PROTOCOL (0, 0, -100)
                // ------------------------------------
                else if (state === 'WAR') {
                    // Room is at (0, 0, -100). Safe zone is interior hallway at X > 2. Windows at X < -4.
                    let rx = headPos.x; 
                    if (rx > 2 && rx < 5) {
                        textEl.setAttribute('value', 'SAFE:\nAWAY FROM\nWINDOWS');
                        textEl.setAttribute('color', '#00FF00');
                    } else {
                        textEl.setAttribute('value', 'WARNING:\nAIR RAID!\nSEEK INTERIOR');
                        textEl.setAttribute('color', '#FF0000');
                    }
                }
                
                // ------------------------------------
                // FLOOD PROTOCOL (100, 0, 0)
                // ------------------------------------
                else if (state === 'FLOOD') {
                    if (window.gameState.floodActive) {
                        // Rise water
                        window.gameState.waterLevel += 0.002;
                        if (window.gameState.waterLevel > 3) window.gameState.waterLevel = 3;
                        
                        let wp = document.querySelector('#water-plane');
                        if (wp) wp.setAttribute('position', {x: 0, y: window.gameState.waterLevel, z: 0});
                        
                        // Check breaker box distance (box relative to flood room is at 0, 2.8, -4.8, so world is 100, 2.8, -4.8)
                        let lHand = document.querySelector('#leftHand');
                        let rHand = document.querySelector('#rightHand');
                        if (lHand && rHand) {
                            let lPos = new THREE.Vector3(); lHand.object3D.getWorldPosition(lPos);
                            let rPos = new THREE.Vector3(); rHand.object3D.getWorldPosition(rPos);
                            let boxPos = new THREE.Vector3(100, 2.8, -4.8);
                            
                            // If player hands overlap breaker, save
                            if (boxPos.distanceTo(lPos) < 0.5 || boxPos.distanceTo(rPos) < 0.5) {
                                window.gameState.floodActive = false;
                            }
                        }
                    }
                    
                    if (!window.gameState.floodActive) {
                        textEl.setAttribute('value', 'SAFE:\nPOWER OFF\nFLOOD STOPPED');
                        textEl.setAttribute('color', '#00FF00');
                    } else {
                        textEl.setAttribute('value', 'WARNING:\nWATER RISING\nPULL BREAKER');
                        textEl.setAttribute('color', '#FF0000');
                    }
                }
            }
        });

        // Keyboard Crouch ('C' Key) for PC users testing WebXR behavior
        document.addEventListener('keydown', (e) => {
            if (e.key === 'c' || e.key === 'C') {
                let rig = document.querySelector('#rig');
                let curY = rig.getAttribute('position').y;
                // A-Frame head is at 1.6m height natively. Dropping rig by 0.8m mimics physical crouch to 0.8m height.
                rig.setAttribute('position', {x: rig.getAttribute('position').x, y: curY === 0 ? -0.8 : 0, z: rig.getAttribute('position').z});
            }
        });
    </script>
</head>

<body style="margin: 0;">
    <!-- Main A-Frame Scene -->
    <a-scene scenario-manager cursor="rayOrigin: mouse" raycaster="objects: .clickable" physics="driver: ammo; gravity: -9.8; debug: false">

        <!-- ===== LIGHTING ===== -->
        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="directional" position="2 4 3" intensity="0.4"></a-light>

        <!-- ===== PLAYER RIG ===== -->
        <a-entity id="rig" movement-controls="speed: 0.15;" kinematic-body position="0 0 4">
            
            <!-- Head (Camera) -->
            <a-entity id="head" camera position="0 1.6 0" look-controls></a-entity>

            <!-- Left Hand (Physics body, Raycaster, Smartwatch UI) -->
            <a-entity id="leftHand" hand-controls="hand: left" laser-controls="hand: left" raycaster="objects: .clickable; far: 5" ammo-body="type: kinematic" ammo-shape="type: sphere; fit: manual; sphereRadius: 0.1;">
                <!-- Smartwatch Mesh attached to left wrist -->
                <a-entity position="0 0 0.1" rotation="-45 90 0">
                    <a-box width="0.1" height="0.1" depth="0.02" color="#222"></a-box>
                    <a-plane position="0 0 0.011" width="0.09" height="0.09" color="#111"></a-plane>
                    <a-text id="watch-text" value="INIT" position="0 0 0.012" align="center" width="0.3" color="#FF3333"></a-text>
                </a-entity>
            </a-entity>

            <!-- Right Hand (Physics body, Raycaster) -->
            <a-entity id="rightHand" hand-controls="hand: right" laser-controls="hand: right" raycaster="objects: .clickable; far: 5" ammo-body="type: kinematic" ammo-shape="type: sphere; fit: manual; sphereRadius: 0.1;"></a-entity>
        </a-entity>

        <!-- ################################################ -->
        <!-- ===== ROOM 0: HUB ZONE =====                     -->
        <!-- ################################################ -->
        <a-entity id="hub-room" position="0 0 0">
            <!-- Room Geometry -->
            <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#f2f2f2"></a-plane>
            <a-box position="0 2 -5" width="10" height="4" depth="0.2" color="#bdc3c7"></a-box>
            <a-plane position="0 4 0" rotation="90 0 0" width="10" height="10" color="#ecf0f1"></a-plane>
            
            <!-- Instructions -->
            <a-text value="EMERGENCY VR TRAINING" position="0 3 -4.8" align="center" color="#2c3e50" scale="2 2 2"></a-text>
            <a-text value="Walk to a door and click to start scenario.\nUse [WASD/Thumbstick] to move. Press [C] to Crouch on PC." position="0 2.2 -4.8" align="center" color="#e74c3c"></a-text>
            
            <!-- Portals -->
            <!-- Fire -->
            <a-box class="clickable" portal="target: 0 0 104; scenario: FIRE" position="-3 1.5 -4" width="1.5" height="3" depth="0.1" color="#E74C3C" animation__hover="property: scale; to: 1.05 1.05 1; dur: 200; startEvents: mouseenter" animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave"></a-box>
            <a-text value="FIRE\n(Crouch)" position="-3 3.5 -4" align="center" color="#E74C3C"></a-text>
            
            <!-- Flood -->
            <a-box class="clickable" portal="target: 100 0 4; scenario: FLOOD" position="-1 1.5 -4" width="1.5" height="3" depth="0.1" color="#3498DB" animation__hover="property: scale; to: 1.05 1.05 1; dur: 200; startEvents: mouseenter" animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave"></a-box>
            <a-text value="FLOOD\n(Breaker)" position="-1 3.5 -4" align="center" color="#3498DB"></a-text>

            <!-- Earthquake -->
            <a-box class="clickable" portal="target: -100 0 4; scenario: EARTHQUAKE" position="1 1.5 -4" width="1.5" height="3" depth="0.1" color="#F1C40F" animation__hover="property: scale; to: 1.05 1.05 1; dur: 200; startEvents: mouseenter" animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave"></a-box>
            <a-text value="QUAKE\n(Table)" position="1 3.5 -4" align="center" color="#F1C40F"></a-text>

            <!-- War -->
            <a-box class="clickable" portal="target: 0 0 -96; scenario: WAR" position="3 1.5 -4" width="1.5" height="3" depth="0.1" color="#34495E" animation__hover="property: scale; to: 1.05 1.05 1; dur: 200; startEvents: mouseenter" animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave"></a-box>
            <a-text value="AIR RAID\n(Interior)" position="3 3.5 -4" align="center" color="#34495E"></a-text>
        </a-entity>

        <!-- ################################################ -->
        <!-- ===== ROOM 1: FIRE PROTOCOL =====                -->
        <!-- ################################################ -->
        <a-entity id="fire-room" position="0 0 100">
            <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#222"></a-plane>
            <a-box position="0 2 -5" width="10" height="4" depth="0.2" color="#333"></a-box>
            
            <!-- Flames & Orange Glow -->
            <a-light type="point" position="0 1 -3" color="#ff6b2b" intensity="1.5"></a-light>
            <!-- Toxic Smoke Layer (Y = 1.2 meters) -->
            <a-plane position="0 1.2 0" rotation="-90 0 0" width="10" height="10" color="#111" material="opacity: 0.85; transparent: true" side="double"></a-plane>

            <!-- Return door (Fire Exit) -->
            <a-box class="clickable" portal="target: 0 0 4; scenario: HUB" position="0 1.5 4.8" width="1.5" height="3" depth="0.1" color="#2ecc71"></a-box>
            <a-text value="EXIT\n(Return to Hub)" position="0 3.5 4.8" rotation="0 180 0" align="center" color="#2ecc71"></a-text>
        </a-entity>

        <!-- ################################################ -->
        <!-- ===== ROOM 2: FLOOD PROTOCOL =====               -->
        <!-- ################################################ -->
        <a-entity id="flood-room" position="100 0 0">
            <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#6c7a89"></a-plane>
            <a-box position="0 2 -5" width="10" height="4" depth="0.2" color="#5a6572"></a-box>
            
            <!-- Rising Water Plane (Controlled by manager) -->
            <a-plane id="water-plane" position="0 -0.5 0" rotation="-90 0 0" width="10" height="10" color="#5c4a3d" material="opacity: 0.8; transparent: true" side="double"></a-plane>
            
            <!-- Objective: Power Breaker Box -->
            <a-entity position="0 2.8 -4.8">
                <a-box width="0.6" height="0.8" depth="0.15" color="#bdc3c7"></a-box>
                <a-box id="breaker-handle" class="clickable" position="0 -0.1 0.1" width="0.1" height="0.3" depth="0.1" color="#e74c3c" animation__hover="property: color; to: #c0392b; dur: 200; startEvents: mouseenter" animation__leave="property: color; to: #e74c3c; dur: 200; startEvents: mouseleave"></a-box>
                <a-text value="RESET\nPOWER" position="0 0.25 0.08" text="color: red; align: center; width: 1.5"></a-text>
            </a-entity>

            <!-- Return door -->
            <a-box class="clickable" portal="target: 0 0 4; scenario: HUB" position="0 1.5 4.8" width="1.5" height="3" depth="0.1" color="#2ecc71"></a-box>
        </a-entity>

        <!-- ################################################ -->
        <!-- ===== ROOM 3: EARTHQUAKE PROTOCOL =====          -->
        <!-- ################################################ -->
        <a-entity id="eq-room" position="-100 0 0">
            <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#d3b8ae"></a-plane>
            <a-box position="0 2 -5" width="10" height="4" depth="0.2" color="#c1a59a"></a-box>
            
            <!-- Sturdy Table in center -->
            <a-entity position="0 0 0">
                <a-box position="0 0.8 0" width="1.5" height="0.1" depth="1.5" color="#5C4033"></a-box>
                <!-- Legs -->
                <a-box position="-0.7 0.4 -0.7" width="0.1" height="0.8" depth="0.1" color="#3e2723"></a-box>
                <a-box position="0.7 0.4 -0.7" width="0.1" height="0.8" depth="0.1" color="#3e2723"></a-box>
                <a-box position="-0.7 0.4 0.7" width="0.1" height="0.8" depth="0.1" color="#3e2723"></a-box>
                <a-box position="0.7 0.4 0.7" width="0.1" height="0.8" depth="0.1" color="#3e2723"></a-box>
            </a-entity>

            <!-- Return door -->
            <a-box class="clickable" portal="target: 0 0 4; scenario: HUB" position="0 1.5 4.8" width="1.5" height="3" depth="0.1" color="#2ecc71"></a-box>
        </a-entity>

        <!-- ################################################ -->
        <!-- ===== ROOM 4: WAR / AIR RAID PROTOCOL =====      -->
        <!-- ################################################ -->
        <a-entity id="war-room" position="0 0 -100">
            <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7f8c8d"></a-plane>
            <a-box position="0 2 -5" width="10" height="4" depth="0.2" color="#95a5a6"></a-box>
            
            <!-- Large Windows on left wall (Dangerous) -->
            <a-plane position="-4.8 2 0" rotation="0 90 0" width="8" height="3" color="#add8e6" material="opacity: 0.3; transparent: true"></a-plane>
            <a-text value="<-- DANGER:\nGLASS SHATTER" position="-4.5 2 0" rotation="0 90 0" color="red"></a-text> <!-- Flipped so it's readable looking left -->

            <!-- Safe Zone (Interior reinforced wall corridor) on right -->
            <a-box position="2.5 2 0" width="0.2" height="4" depth="8" color="#2c3e50"></a-box>
            <a-text value="SAFE ZONE:\nINTERIOR WALL" position="2.3 2 0" rotation="0 -90 0" color="#2ecc71"></a-text>

            <!-- Return door -->
            <a-box class="clickable" portal="target: 0 0 4; scenario: HUB" position="0 1.5 4.8" width="1.5" height="3" depth="0.1" color="#2ecc71"></a-box>
        </a-entity>

    </a-scene>
</body>

</html>

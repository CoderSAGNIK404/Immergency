<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Young Innovators STEM Lab - Virtual Classroom</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    /* ===== ROLE SELECTION OVERLAY ===== */
    #role-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }
    #role-overlay h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(100, 100, 255, 0.5);
    }
    #role-overlay p {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 2rem;
    }
    .role-buttons {
      display: flex;
      gap: 2rem;
    }
    .role-btn {
      padding: 1.2rem 2.5rem;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .role-btn.teacher {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
      box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
    }
    .role-btn.teacher:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(245, 87, 108, 0.6);
    }
    .role-btn.student {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      box-shadow: 0 4px 20px rgba(79, 172, 254, 0.4);
    }
    .role-btn.student:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(79, 172, 254, 0.6);
    }

    /* ===== PERMISSION OVERLAY ===== */
    #permission-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }
    #permission-overlay .spinner {
      width: 50px; height: 50px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #4facfe;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #permission-overlay h2 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
    #permission-overlay p {
      color: #aaa;
      font-size: 1rem;
    }
    #permission-granted {
      display: none;
      text-align: center;
    }
    #permission-granted h2 {
      color: #00e676;
      font-size: 1.8rem;
    }
    #permission-granted p {
      color: #aaa;
    }

    /* ===== TEACHER NOTIFICATION PANEL ===== */
    #teacher-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(245, 87, 108, 0.5);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      z-index: 9997;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      display: none;
      min-width: 250px;
      backdrop-filter: blur(10px);
    }
    #teacher-panel h3 {
      margin: 0 0 0.8rem 0;
      font-size: 1rem;
      color: #f5576c;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 0.5rem;
    }
    .student-request {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .student-request span {
      font-size: 0.9rem;
    }
    .approve-btn {
      background: linear-gradient(135deg, #00e676, #00c853);
      border: none;
      color: white;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .approve-btn:hover { opacity: 0.8; }

    /* ===== ROLE HUD ===== */
    #role-hud {
      position: fixed;
      top: 15px;
      left: 15px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      z-index: 9997;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: none;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
    }
    #role-hud .role-label {
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #role-hud .role-label.teacher { color: #f5576c; }
    #role-hud .role-label.student { color: #4facfe; }

    /* ===== DOOR PROMPT ===== */
    #door-prompt {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      z-index: 9997;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: none;
      font-size: 1rem;
      text-align: center;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <!-- ===== ROLE SELECTION OVERLAY ===== -->
  <div id="role-overlay">
    <h1>🏫 Virtual Classroom</h1>
    <p>Select your role to enter the school</p>
    <div class="role-buttons">
      <button class="role-btn teacher" onclick="selectRole('teacher')">🎓 Enter as Teacher</button>
      <button class="role-btn student" onclick="selectRole('student')">📚 Enter as Student</button>
    </div>
  </div>

  <!-- ===== PERMISSION OVERLAY (for students) ===== -->
  <div id="permission-overlay">
    <div id="permission-waiting">
      <div class="spinner"></div>
      <h2>Requesting Permission...</h2>
      <p>Waiting for the teacher to grant access</p>
    </div>
    <div id="permission-granted">
      <h2>✅ Permission Granted!</h2>
      <p>The teacher has allowed you to enter</p>
    </div>
  </div>

  <!-- ===== ROLE HUD ===== -->
  <div id="role-hud">
    <span id="scene-label">Outside School</span> &bull;
    Role: <span id="role-label-text" class="role-label"></span>
  </div>

  <!-- ===== DOOR PROMPT ===== -->
  <div id="door-prompt">Click the door to enter the classroom</div>

  <!-- ===== TEACHER NOTIFICATION PANEL ===== -->
  <div id="teacher-panel">
    <h3>📋 Student Requests</h3>
    <div id="student-requests">
      <p style="color: #666; font-size: 0.85rem;">No requests yet</p>
    </div>
  </div>

  <!-- ===== A-FRAME SCENE ===== -->
  <a-scene shadow="type: pcfsoft" cursor="rayOrigin: mouse" raycaster="objects: .clickable">

    <!-- ===== ASSETS ===== -->
    <a-assets></a-assets>

    <!-- ############################################### -->
    <!-- ===== EXTERIOR SCENE (visible by default) ===== -->
    <!-- ############################################### -->
    <a-entity id="exterior-scene">

      <!-- Sky -->
      <a-sky color="#87CEEB"></a-sky>
      <a-light type="ambient" color="#FFF" intensity="0.5"></a-light>
      <a-light type="directional" position="5 10 5" intensity="0.8" castShadow="true"></a-light>

      <!-- Camera outside -->
      <a-entity id="exterior-cam" position="0 1.6 10" camera="active: true" look-controls wasd-controls>
      </a-entity>

      <!-- Ground (grass) -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="60" height="60" color="#4CAF50" shadow="receive: true"></a-plane>

      <!-- Path to school -->
      <a-plane position="0 0.01 6" rotation="-90 0 0" width="2" height="8" color="#B0B0B0"></a-plane>

      <!-- ===== SCHOOL BUILDING EXTERIOR ===== -->
      <!-- Front wall -->
      <a-box position="0 2.5 0" width="12" height="5" depth="0.3" color="#FFF8DC"></a-box>
      <!-- Left wall -->
      <a-box position="-6 2.5 -5" width="0.3" height="5" depth="10" color="#F5E6C8"></a-box>
      <!-- Right wall -->
      <a-box position="6 2.5 -5" width="0.3" height="5" depth="10" color="#F5E6C8"></a-box>
      <!-- Back wall -->
      <a-box position="0 2.5 -10" width="12" height="5" depth="0.3" color="#F5E6C8"></a-box>

      <!-- Roof -->
      <a-box position="0 5.2 -5" width="13" height="0.3" depth="11" color="#8B4513"></a-box>
      <!-- Roof ridge (triangular feel via rotated boxes) -->
      <a-box position="0 5.9 -5" width="13.5" height="0.2" depth="6" rotation="0 0 0" color="#6B3410"></a-box>

      <!-- Windows on front wall -->
      <a-box position="-3.5 3 0.2" width="1.5" height="1.5" depth="0.1" color="#ADD8E6" opacity="0.5"></a-box>
      <a-box position="-3.5 3 0.22" width="1.6" height="0.08" depth="0.05" color="#5C4033"></a-box>
      <a-box position="-3.5 3 0.22" width="0.08" height="1.6" depth="0.05" color="#5C4033"></a-box>

      <a-box position="3.5 3 0.2" width="1.5" height="1.5" depth="0.1" color="#ADD8E6" opacity="0.5"></a-box>
      <a-box position="3.5 3 0.22" width="1.6" height="0.08" depth="0.05" color="#5C4033"></a-box>
      <a-box position="3.5 3 0.22" width="0.08" height="1.6" depth="0.05" color="#5C4033"></a-box>

      <!-- ===== CLICKABLE DOOR ===== -->
      <a-entity id="door-group" class="clickable" position="0 0 0.2">
        <!-- Door frame -->
        <a-box position="0 1.5 0" width="1.8" height="3.2" depth="0.15" color="#5C4033"></a-box>
        <!-- Door itself -->
        <a-box id="school-door" position="0 1.5 0.05" width="1.5" height="3" depth="0.1" color="#8B4513"
          animation__hover="property: color; to: #A0522D; dur: 200; startEvents: mouseenter"
          animation__leave="property: color; to: #8B4513; dur: 200; startEvents: mouseleave"
          animation__click="property: scale; to: 1.05 1.02 1; dur: 150; startEvents: click; dir: alternate; loop: 1">
        </a-box>
        <!-- Door handle -->
        <a-sphere position="0.55 1.5 0.15" radius="0.08" color="#FFD700"
          animation__glow="property: color; to: #FFF700; dur: 500; startEvents: mouseenter"
          animation__dim="property: color; to: #FFD700; dur: 500; startEvents: mouseleave">
        </a-sphere>
        <!-- Door arch -->
        <a-box position="0 3.15 0" width="2" height="0.15" depth="0.2" color="#5C4033"></a-box>
      </a-entity>

      <!-- School name sign -->
      <a-box position="0 4.2 0.25" width="6" height="0.8" depth="0.1" color="#2E4E2E"></a-box>
      <a-text value="YOUNG INNOVATORS STEM LAB" position="0 4.2 0.32" align="center" color="#FFFFFF" width="5" font="mozillavr"></a-text>

      <!-- Decorative bushes -->
      <a-sphere position="-4 0.4 1.5" radius="0.5" color="#228B22"></a-sphere>
      <a-sphere position="-3.5 0.35 1.8" radius="0.4" color="#2E8B57"></a-sphere>
      <a-sphere position="4 0.4 1.5" radius="0.5" color="#228B22"></a-sphere>
      <a-sphere position="3.5 0.35 1.8" radius="0.4" color="#2E8B57"></a-sphere>

      <!-- Flag pole -->
      <a-cylinder position="-5.5 2 1" radius="0.04" height="4" color="#C0C0C0"></a-cylinder>
      <a-plane position="-5.1 3.7 1" width="0.8" height="0.3" color="#FF9933"></a-plane>
      <a-plane position="-5.1 3.4 1" width="0.8" height="0.3" color="#FFFFFF"></a-plane>
      <a-plane position="-5.1 3.1 1" width="0.8" height="0.3" color="#138808"></a-plane>

      <!-- Small trees -->
      <a-cylinder position="7 1.5 -3" radius="0.15" height="3" color="#8B4513"></a-cylinder>
      <a-sphere position="7 3.5 -3" radius="1" color="#228B22"></a-sphere>
      <a-cylinder position="-7 1.5 -3" radius="0.15" height="3" color="#8B4513"></a-cylinder>
      <a-sphere position="-7 3.5 -3" radius="1" color="#2E8B57"></a-sphere>

    </a-entity>

    <!-- ################################################# -->
    <!-- ===== CLASSROOM INTERIOR (hidden by default) ===== -->
    <!-- ################################################# -->
    <a-entity id="classroom-scene" visible="false">

      <!-- Sky (interior lighting feel) -->
      <a-sky color="#E8E4D8"></a-sky>
      <a-light type="ambient" color="#FFF" intensity="0.6"></a-light>
      <a-light type="directional" position="2 8 -3" intensity="0.7" castShadow="true"></a-light>
      <!-- Ceiling lights -->
      <a-light type="point" position="-2 3.8 -3" intensity="0.4" color="#FFF5E1"></a-light>
      <a-light type="point" position="2 3.8 -3" intensity="0.4" color="#FFF5E1"></a-light>

      <!-- Camera inside classroom -->
      <a-entity id="classroom-cam" position="0 1.6 1" camera="active: false" look-controls wasd-controls>
      </a-entity>

      <!-- ===== CLASSROOM FLOOR ===== -->
      <a-plane position="0 0.01 -3" rotation="-90 0 0" width="10" height="10" color="#D2B48C" shadow="receive: true"></a-plane>

      <!-- ===== WALLS ===== -->
      <a-box position="0 2 -8" width="10" height="4" depth="0.2" color="#FFF8DC"></a-box>
      <a-box position="-5 2 -3" width="0.2" height="4" depth="10" color="#FFF8DC"></a-box>
      <a-box position="5 2 -3" width="0.2" height="4" depth="10" color="#FFF8DC"></a-box>
      <!-- Front wall (with door gap) -->
      <a-box position="-3 2 2" width="4" height="4" depth="0.2" color="#FFF8DC"></a-box>
      <a-box position="3.5 2 2" width="3" height="4" depth="0.2" color="#FFF8DC"></a-box>
      <a-box position="1.5 3.5 2" width="1" height="1" depth="0.2" color="#FFF8DC"></a-box>

      <!-- ===== CEILING ===== -->
      <a-plane position="0 4 -3" rotation="90 0 0" width="10" height="10" color="#F5F5DC"></a-plane>
      <!-- Ceiling light fixtures -->
      <a-box position="-2 3.95 -3" width="0.8" height="0.05" depth="0.3" color="#FFFFFF"></a-box>
      <a-box position="2 3.95 -3" width="0.8" height="0.05" depth="0.3" color="#FFFFFF"></a-box>

      <!-- ===== DOOR (interior side) ===== -->
      <a-box position="1.5 1.25 1.9" width="1" height="2.5" depth="0.15" color="#8B4513"></a-box>
      <a-sphere position="1.15 1.25 1.82" radius="0.06" color="#FFD700"></a-sphere>

      <!-- ===== WINDOWS ===== -->
      <a-box position="-4.85 2.5 -2" width="0.05" height="1.5" depth="1.5" color="#ADD8E6" opacity="0.4"></a-box>
      <a-box position="-4.85 2.5 -2" width="0.06" height="1.5" depth="0.05" color="#A0522D"></a-box>
      <a-box position="-4.85 2.5 -2" width="0.06" height="0.05" depth="1.5" color="#A0522D"></a-box>
      <a-box position="-4.85 2.5 -5" width="0.05" height="1.5" depth="1.5" color="#ADD8E6" opacity="0.4"></a-box>
      <a-box position="-4.85 2.5 -5" width="0.06" height="1.5" depth="0.05" color="#A0522D"></a-box>
      <a-box position="-4.85 2.5 -5" width="0.06" height="0.05" depth="1.5" color="#A0522D"></a-box>

      <!-- ===== BLACKBOARD ===== -->
      <a-box position="0 2.3 -7.85" width="4" height="2" depth="0.1" color="#2E4E2E"></a-box>
      <a-box position="0 3.35 -7.83" width="4.1" height="0.1" depth="0.12" color="#5C4033"></a-box>
      <a-box position="0 1.25 -7.83" width="4.1" height="0.1" depth="0.12" color="#5C4033"></a-box>
      <a-box position="-2.05 2.3 -7.83" width="0.1" height="2.1" depth="0.12" color="#5C4033"></a-box>
      <a-box position="2.05 2.3 -7.83" width="0.1" height="2.1" depth="0.12" color="#5C4033"></a-box>
      <a-box position="0 1.2 -7.7" width="3" height="0.05" depth="0.15" color="#5C4033"></a-box>
      <a-text value="Welcome to Class!" position="0 2.5 -7.78" align="center" color="#FFFFFF" width="4"></a-text>
      <a-text value="A + B = C" position="0 2.0 -7.78" align="center" color="#FFFFAA" width="3"></a-text>

      <!-- ===== TEACHER'S DESK ===== -->
      <a-box position="0 0.75 -6.5" width="2" height="0.08" depth="0.8" color="#8B4513"></a-box>
      <a-box position="-0.9 0.38 -6.8" width="0.08" height="0.75" depth="0.08" color="#6B3410"></a-box>
      <a-box position="0.9 0.38 -6.8" width="0.08" height="0.75" depth="0.08" color="#6B3410"></a-box>
      <a-box position="-0.9 0.38 -6.2" width="0.08" height="0.75" depth="0.08" color="#6B3410"></a-box>
      <a-box position="0.9 0.38 -6.2" width="0.08" height="0.75" depth="0.08" color="#6B3410"></a-box>
      <!-- Teacher's chair -->
      <a-box position="0 0.4 -5.8" width="0.5" height="0.05" depth="0.5" color="#A0522D"></a-box>
      <a-box position="0 0.7 -6.03" width="0.5" height="0.6" depth="0.05" color="#A0522D"></a-box>

      <!-- ===== STUDENT DESKS (Row 1) ===== -->
      <a-box position="-2.5 0.55 -4" width="1.2" height="0.06" depth="0.6" color="#DEB887"></a-box>
      <a-box position="-2.5 0.28 -4" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="-3.05 0.28 -4" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="-1.95 0.28 -4" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="-2.5 0.35 -3.3" width="0.45" height="0.04" depth="0.4" color="#FF6347"></a-box>
      <a-box position="-2.5 0.6 -3.12" width="0.45" height="0.5" depth="0.04" color="#FF6347"></a-box>

      <a-box position="0 0.55 -4" width="1.2" height="0.06" depth="0.6" color="#DEB887"></a-box>
      <a-box position="0 0.28 -4" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="-0.55 0.28 -4" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="0.55 0.28 -4" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="0 0.35 -3.3" width="0.45" height="0.04" depth="0.4" color="#4682B4"></a-box>
      <a-box position="0 0.6 -3.12" width="0.45" height="0.5" depth="0.04" color="#4682B4"></a-box>

      <a-box position="2.5 0.55 -4" width="1.2" height="0.06" depth="0.6" color="#DEB887"></a-box>
      <a-box position="2.5 0.28 -4" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="1.95 0.28 -4" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="3.05 0.28 -4" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="2.5 0.35 -3.3" width="0.45" height="0.04" depth="0.4" color="#32CD32"></a-box>
      <a-box position="2.5 0.6 -3.12" width="0.45" height="0.5" depth="0.04" color="#32CD32"></a-box>

      <!-- ===== STUDENT DESKS (Row 2) ===== -->
      <a-box position="-2.5 0.55 -1.5" width="1.2" height="0.06" depth="0.6" color="#DEB887"></a-box>
      <a-box position="-2.5 0.28 -1.5" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="-3.05 0.28 -1.5" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="-1.95 0.28 -1.5" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="-2.5 0.35 -0.8" width="0.45" height="0.04" depth="0.4" color="#FFD700"></a-box>
      <a-box position="-2.5 0.6 -0.62" width="0.45" height="0.5" depth="0.04" color="#FFD700"></a-box>

      <a-box position="0 0.55 -1.5" width="1.2" height="0.06" depth="0.6" color="#DEB887"></a-box>
      <a-box position="0 0.28 -1.5" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="-0.55 0.28 -1.5" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="0.55 0.28 -1.5" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="0 0.35 -0.8" width="0.45" height="0.04" depth="0.4" color="#FF69B4"></a-box>
      <a-box position="0 0.6 -0.62" width="0.45" height="0.5" depth="0.04" color="#FF69B4"></a-box>

      <a-box position="2.5 0.55 -1.5" width="1.2" height="0.06" depth="0.6" color="#DEB887"></a-box>
      <a-box position="2.5 0.28 -1.5" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="1.95 0.28 -1.5" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="3.05 0.28 -1.5" width="0.06" height="0.55" depth="0.06" color="#A0522D"></a-box>
      <a-box position="2.5 0.35 -0.8" width="0.45" height="0.04" depth="0.4" color="#9370DB"></a-box>

  <!-- ===== JAVASCRIPT LOGIC ===== -->
  <script>
    // --- State ---
    let currentRole = null;     // 'teacher' or 'student'
    let currentScene = 'roleSelect'; // 'roleSelect', 'exterior', 'classroom'
    let studentCount = 0;

    // --- DOM References ---
    const roleOverlay = document.getElementById('role-overlay');
    const permissionOverlay = document.getElementById('permission-overlay');
    const permissionWaiting = document.getElementById('permission-waiting');
    const permissionGranted = document.getElementById('permission-granted');
    const roleHud = document.getElementById('role-hud');
    const roleLabelText = document.getElementById('role-label-text');
    const sceneLabel = document.getElementById('scene-label');
    const doorPrompt = document.getElementById('door-prompt');
    const teacherPanel = document.getElementById('teacher-panel');
    const studentRequests = document.getElementById('student-requests');
    const exteriorScene = document.getElementById('exterior-scene');
    const classroomScene = document.getElementById('classroom-scene');
    const exteriorCam = document.getElementById('exterior-cam');
    const classroomCam = document.getElementById('classroom-cam');
    const doorGroup = document.getElementById('door-group');

    // --- Role Selection ---
    function selectRole(role) {
      currentRole = role;
      roleOverlay.style.display = 'none';

      // Show HUD
      roleHud.style.display = 'block';
      roleLabelText.textContent = role.charAt(0).toUpperCase() + role.slice(1);
      roleLabelText.className = 'role-label ' + role;
      sceneLabel.textContent = 'Outside School';

      // Show door prompt
      doorPrompt.style.display = 'block';

      // Show exterior scene
      switchToExterior();

      // If teacher, show notification panel
      if (role === 'teacher') {
        teacherPanel.style.display = 'block';
        // Simulate a student request after a few seconds
        setTimeout(simulateStudentRequest, 5000);
      }
    }

    // --- Scene Switching ---
    function switchToExterior() {
      currentScene = 'exterior';
      exteriorScene.setAttribute('visible', 'true');
      classroomScene.setAttribute('visible', 'false');
      exteriorCam.setAttribute('camera', 'active: true');
      classroomCam.setAttribute('camera', 'active: false');
    }

    function switchToClassroom() {
      currentScene = 'classroom';
      exteriorScene.setAttribute('visible', 'false');
      classroomScene.setAttribute('visible', 'true');
      exteriorCam.setAttribute('camera', 'active: false');
      classroomCam.setAttribute('camera', 'active: true');
      sceneLabel.textContent = 'Inside Classroom';
      doorPrompt.style.display = 'none';
    }

    // --- Door Click Handler ---
    doorGroup.addEventListener('click', function () {
      if (currentScene !== 'exterior') return;

      if (currentRole === 'teacher') {
        // Teacher enters directly
        switchToClassroom();
      } else if (currentRole === 'student') {
        // Student requests permission
        requestPermission();
      }
    });

    // --- Student Permission Flow ---
    function requestPermission() {
      permissionOverlay.style.display = 'flex';
      permissionWaiting.style.display = 'block';
      permissionGranted.style.display = 'none';
      doorPrompt.style.display = 'none';

      // Simulate teacher granting permission after 3 seconds
      setTimeout(function () {
        permissionWaiting.style.display = 'none';
        permissionGranted.style.display = 'block';

        // Enter classroom after showing "granted" for 1.5 seconds
        setTimeout(function () {
          permissionOverlay.style.display = 'none';
          switchToClassroom();
        }, 1500);
      }, 3000);
    }

    // --- Simulate Student Request (for teacher view) ---
    function simulateStudentRequest() {
      studentCount++;
      const studentName = 'Student ' + studentCount;

      const requestDiv = document.createElement('div');
      requestDiv.className = 'student-request';
      requestDiv.innerHTML =
        '<span>📖 ' + studentName + ' wants to enter</span>' +
        '<button class="approve-btn" onclick="approveStudent(this)">✓ Allow</button>';

      // Clear "no requests" text
      if (studentCount === 1) {
        studentRequests.innerHTML = '';
      }
      studentRequests.appendChild(requestDiv);

      // Simulate more requests periodically
      if (studentCount < 4) {
        setTimeout(simulateStudentRequest, 6000 + Math.random() * 4000);
      }
    }

    function approveStudent(btn) {
      const requestDiv = btn.parentElement;
      const nameSpan = requestDiv.querySelector('span');
      nameSpan.innerHTML = '✅ ' + nameSpan.textContent.replace(' wants to enter', '') + ' — Allowed';
      nameSpan.style.color = '#00e676';
      btn.remove();
    }
  </script>
